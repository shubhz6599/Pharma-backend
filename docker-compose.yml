# docker-compose.yml — Production-ready orchestration
version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: pharma_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: pharma_db
    networks:
      - pharma_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharma_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/pharma_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: 7d
      CLIENT_URL: ${CLIENT_URL:-http://localhost:4200}
    networks:
      - pharma_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharma_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - pharma_network

volumes:
  mongo_data:

networks:
  pharma_network:
    driver: bridge